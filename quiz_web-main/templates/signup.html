<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | QuizPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <div style="margin-bottom: 1rem;">
            <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 500;">&larr; Буцах</a>
        </div>
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Хэрэглэгч үүсгэх</h2>
        <form method="POST" action="/signup">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Хэрэглэгчийн нэр</label>
                <input type="text" name="name" class="form-control" required placeholder="Бат Мөнх(Bat Munkh)">
            </div>
            <div class="form-group">
                <label>Утасны дугаар</label>
                <div style="display: flex; align-items: center; border: 1px solid #d1d5db; border-radius: 8px; overflow: hidden; margin-top: 0.5rem;">
                    <span style="background: #f3f4f6; padding: 0.75rem 1rem; border-right: 1px solid #d1d5db; color: #4b5563; font-weight: 500;">+976</span>
                    <input type="tel" name="phone" style="border: none; flex-grow: 1; padding: 0.75rem 1rem; outline: none;" required placeholder="9999 9999" pattern="[0-9]{8}" title="Утасны дугаар нь 8 оронтой тоо байх ёстой">
                </div>
            </div>
            <div class="form-group" style="margin-top: 1rem;">
                <label>Нэвтрэх нууц үг</label>
                <input type="password" name="password" class="form-control" required minlength="6" placeholder="Дор хаяж 6 тэмдэгт байх шаардлагатай">
            </div>
            <button type="submit" class="btn" style="width: 100%;">Бүртгүүлэх</button>
        </form>
    </div>
</body>
</html>
