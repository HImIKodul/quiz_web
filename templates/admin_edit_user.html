<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User | QuizPro Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header style="border-bottom: 1px solid #fee2e2;">
        <a href="/admin/billing" class="logo" style="color: #2563eb;">Billing Admin Area</a>
        <nav><a href="/logout">Logout</a></nav>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 1rem;">Edit User Details</h2>
        <a href="/admin/billing" style="color: var(--primary); text-decoration: none; font-weight: 500;">&larr; Back to Admin Dashboard</a>
        
        <div class="card" style="max-width: 600px; margin-top: 2rem;">
            <p style="color: var(--text-muted); margin-bottom: 1rem;">Identifier / Phone: <strong>{{ u.identifier }}</strong></p>
            <p style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem;">Joined: {{ u.created_at.strftime('%Y-%m-%d %H:%M') if u.created_at else 'Unknown' }}</p>
            
            <form action="/admin/billing/edit_user/{{ u.id }}" method="POST">
                <div class="form-group" style="margin-top: 1.5rem;">
                    <label>User's Full Name</label>
                    <input type="text" name="name" class="form-control" value="{{ u.name }}" required>
                </div>
                
                <div class="form-group">
                    <label>Override Password (leave blank to keep current)</label>
                    <input type="password" name="password" class="form-control" placeholder="New Password...">
                </div>

                <div class="form-group">
                    <label>System Role</label>
                    <select name="role" class="form-control">
                        <option value="user" {% if u.role == 'user' %}selected{% endif %}>Standard User</option>
                        <option value="content_admin" {% if u.role == 'content_admin' %}selected{% endif %}>Content Admin</option>
                        <option value="billing_admin" {% if u.role == 'billing_admin' %}selected{% endif %}>Billing Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Subscription Plan</label>
                    <select name="plan" class="form-control" style="border-color: #2563eb;" onchange="updateMaxDevices(this.value)">
                        <option value="none" {% if u.plan == 'none' %}selected{% endif %}>None (Free Tier - 1 device)</option>
                        <option value="plus" {% if u.plan == 'plus' %}selected{% endif %}>QuizPro Plus (3 devices)</option>
                        <option value="pro" {% if u.plan == 'pro' %}selected{% endif %}>QuizPro Pro (5 devices)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Max Allowed Devices (override if needed)</label>
                    <input type="number" name="max_devices" id="max_devices" class="form-control" value="{{ u.max_devices if u.max_devices is not none else (5 if u.plan == 'pro' else (3 if u.plan == 'plus' else 1)) }}" min="1">
                </div>

                <div class="form-group">
                    <label>Plan Expiration Date (leave blank for unlimited)</label>
                    <div style="display: flex; gap: 0.5rem; align-items: stretch;">
                        <input type="date" name="plan_expire_date" id="plan_expire_date" class="form-control" value="{{ u.plan_expire_date.strftime('%Y-%m-%d') if u.plan_expire_date else '' }}" style="border-color: #2563eb; flex: 1;">
                        <button type="button" class="btn btn-outline" style="padding: 0 1rem; border-color: #2563eb; color: #2563eb; background: transparent; cursor: pointer; border-radius: 4px;" onclick="addOneMonth()">+1 Month from Today</button>
                    </div>
                </div>

                <button type="submit" class="btn" style="background-color: #2563eb; width: 100%; margin-top: 1rem;">Update User Settings</button>
            </form>
            
            <script>
                function addOneMonth() {
                    let d = new Date();
                    d.setMonth(d.getMonth() + 1);
                    document.getElementById('plan_expire_date').value = d.toISOString().split('T')[0];
                }
                function updateMaxDevices(plan) {
                    let el = document.getElementById('max_devices');
                    if (plan === 'pro') el.value = 5;
                    else if (plan === 'plus') el.value = 3;
                    else if (plan === 'none') el.value = 1; // Assuming free tier has 1 device
                }
            </script>
        </div>
    </main>
</body>
</html>
