<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | QuizPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Нэвтрэх</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <p style="color: #dc2626; text-align: center; margin-bottom: 1rem;">{{ messages[0] }}</p>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Утасны дугаар</label>
                <input type="text" name="identifier" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Нууц үг</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Нэвтрэх</button>
        </form>
        <p style="text-align: center; margin-top: 1rem;">
            Шинэ хэрэглэгчээр <a href="/signup" style="color: var(--primary);">Бүртгүүлэх</a>
        </p>
    </div>
</body>
</html>
