<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pricing & Plans | QuizPro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='mata_logo.jpeg') }}" alt="MATA Logo" style="height: 40px; width: auto;">
        </a>
        <nav>
            <a href="/dashboard">Нүүр хуудас</a>
        </nav>
    </header>

    <main class="container" style="text-align: center; padding-top: 4rem;">
        <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">Төлбөр мэдээлэл</h2>

        <div class="pricing-grid">
            <!-- Plus Plan -->
            <div class="pricing-card">
                <h3 class="pricing-title">Үнэгүй</h3>
                <div class="pricing-price">₮0<span>/сард</span></div>
                
                <ul class="pricing-features">
                    <li>өдөрт 10 асуулт</li>
                </ul>
                
                <button class="btn btn-outline" style="width: 100%; border-color: var(--primary); color: var(--primary);">Таны одоогийн төлөв</button>
            </div>

            <!-- Pro Plan -->
            <div class="pricing-card pro">
                <h3 class="pricing-title">Үндсэн</h3>
                <div class="pricing-price">₮10,000<span>/сард</span></div>
                
                <ul class="pricing-features">
                    <li>Хязгааргүй асуулт</li>
                </ul>
                
                <button class="btn" style="width: 100%;">Төлбөр төлөх</button>
            </div>
        </div>
    </main>
</body>
</html>
